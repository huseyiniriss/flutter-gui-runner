name: Release

# Build the app and attach a DMG to a GitHub Release whenever a v* tag is pushed.
#   git tag v0.2.0 && git push origin v0.2.0
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}        # allow manual runs from the Actions tab

permissions:
  contents: write              # needed to create/update the release

jobs:
  build:
    runs-on: macos-15        # default Xcode 16 → Swift 6
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: swift --version

      - name: Build app + DMG
        run: |
          chmod +x build-app.sh scripts/make-dmg.sh
          ./scripts/make-dmg.sh

      - name: Upload DMG as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlutterGUIRunner-dmg
          path: dist/FlutterGUIRunner.dmg

      - name: Attach DMG to the release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/FlutterGUIRunner.dmg
          generate_release_notes: true
